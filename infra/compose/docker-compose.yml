version: "3.9"

services:
  # -----------------------------------------------------------------------
  # PostgreSQL - canonical memory store
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aegismem_postgres
    environment:
      POSTGRES_DB: aegismem
      POSTGRES_USER: aegismem
      POSTGRES_PASSWORD: aegismem_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegismem"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # Qdrant - vector store
  # -----------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aegismem_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # Neo4j - graph store
  # -----------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: aegismem_neo4j
    environment:
      NEO4J_AUTH: neo4j/aegismem_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # -----------------------------------------------------------------------
  # Redis - cache + session state + Celery broker
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: aegismem_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # AegisMem API
  # -----------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    container_name: aegismem_api
    environment:
      APP_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: aegismem
      POSTGRES_USER: aegismem
      POSTGRES_PASSWORD: aegismem_password
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: aegismem_password
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-mock}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-mock}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./:/app
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # -----------------------------------------------------------------------
  # Celery worker - async jobs (reflection, summarization, etc.)
  # -----------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    container_name: aegismem_worker
    environment:
      APP_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: aegismem_password
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: aegismem_password
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    depends_on:
      - redis
      - postgres
    command: celery -A apps.worker.tasks worker --loglevel=info --concurrency=2

  # -----------------------------------------------------------------------
  # Prometheus
  # -----------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: aegismem_prometheus
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    profiles:
      - observability

  # -----------------------------------------------------------------------
  # Grafana
  # -----------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: aegismem_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    profiles:
      - observability

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  redis_data:
  grafana_data:
